<div class="login-shell">
	<div class="login-bg login-bg-one"></div>
	<div class="login-bg login-bg-two"></div>

	<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center px-3 py-4">
		<div class="row g-0 login-card shadow-lg overflow-hidden">
			<div class="col-lg-6 login-hero d-none d-lg-flex flex-column justify-content-between p-5 text-white">
				<div>
					<div class="badge rounded-pill text-bg-light text-primary-emphasis mb-4 px-3 py-2 hero-badge">
						Employee Hub
					</div>
					<h1 class="display-5 fw-semibold mb-3">Welcome back</h1>
					<p class="lead mb-4 opacity-75">
						Manage employees, departments, and designations from one clean dashboard.
					</p>
				</div>

				<div class="hero-stats row g-3">
					<div class="col-6">
						<div class="stat-card p-3 rounded-4">
							<div class="stat-value">24/7</div>
							<div class="stat-label">Access</div>
						</div>
					</div>
					<div class="col-6">
						<div class="stat-card p-3 rounded-4">
							<div class="stat-value">100%</div>
							<div class="stat-label">Static UI</div>
						</div>
					</div>
				</div>
			</div>

			<div class="col-lg-6 bg-white p-4 p-md-5 login-form-panel">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<div>
						<p class="text-uppercase text-primary fw-semibold small mb-1 letter-spacing">
							Sign in
						</p>
						<h2 class="fw-bold mb-0">Employee Management</h2>
					</div>
					<div class="brand-mark rounded-4 d-flex align-items-center justify-content-center">
						EM
					</div>
				</div>

				<form class="login-form">
					<div class="mb-3">
						<label for="email" class="form-label fw-semibold">Email address</label>
						<div class="input-group input-group-lg animated-field">
							<span class="input-group-text bg-transparent border-end-0">
								<span class="field-icon">@</span>
							</span>
							<input
								id="email"
								type="email"
								class="form-control border-start-0"
								placeholder="name@company.com"
								autocomplete="email"
							/>
						</div>
					</div>

					<div class="mb-3">
						<label for="password" class="form-label fw-semibold">Password</label>
						<div class="input-group input-group-lg animated-field">
							<span class="input-group-text bg-transparent border-end-0">
								<span class="field-icon">*</span>
							</span>
							<input
								id="password"
								type="password"
								class="form-control border-start-0"
								placeholder="Enter your password"
								autocomplete="current-password"
							/>
						</div>
					</div>

					<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
						<div class="form-check">
							<input class="form-check-input" type="checkbox" id="rememberMe" />
							<label class="form-check-label" for="rememberMe">Remember me</label>
						</div>
						<a href="#" class="text-decoration-none small fw-semibold">Forgot password?</a>
					</div>

					<button type="button" class="btn btn-primary btn-lg w-100 login-button">
						Sign in
					</button>
				</form>

				<div class="mt-4 text-center text-muted small">
					<span>Need access?</span>
					<a href="#" class="text-decoration-none fw-semibold ms-1">Contact admin</a>
				</div>
			</div>
		</div>
	</div>
</div>
